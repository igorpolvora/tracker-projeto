# Usa a variável de ambiente DATABASE_URL fornecida pelo Render, 
# se não existir, usa o localhost como padrão.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/tracker_db}
spring.datasource.username=${DATABASE_USER:admin}
spring.datasource.password=${DATABASE_PASSWORD:adminpassword}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true