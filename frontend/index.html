<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Estudos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-formiga">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M35 30 Q20 10 15 15" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
                    <path d="M65 30 Q80 10 85 15" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
                    <circle cx="50" cy="55" r="25" fill="white"/>
                    <circle cx="40" cy="50" r="4" fill="var(--cor-icone)"/>
                    <circle cx="60" cy="50" r="4" fill="var(--cor-icone)"/>
                </svg>
            </div>
            <h1>Meu Tracker</h1>
            <button id="btnTema" class="btn-tema" onclick="alternarTema()" title="Alternar Tema">🌙</button>
        </header>

        <div class="pomodoro-container">
            <h2>Modo Foco</h2>
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-controls">
                <button type="button" class="btn-timer btn-start" id="btnTimerStart" onclick="toggleTimer()">Iniciar</button>
                <button type="button" class="btn-timer btn-reset" onclick="resetTimer()">Resetar</button>
            </div>
        </div>

        <form id="formEstudo">
            <div class="form-group">
                <label for="materia">O que você estudou?</label>
                <input type="text" id="materia" placeholder="Ex: Spring Boot" required>
            </div>
            <div class="form-group">
                <label for="tempo">Tempo investido (minutos)</label>
                <input type="number" id="tempo" placeholder="Ex: 25" min="1" required>
            </div>
            <button type="submit" class="btn-submit">Registrar Estudo</button>
        </form>

        <div class="secao-grafico" id="containerGrafico" style="display: none;">
            <h2>Tempo por Matéria</h2>
            <canvas id="graficoEstudos"></canvas>
        </div>

        <div class="lista-estudos">
            <h2>Histórico</h2>
            <div id="containerRegistros"></div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
